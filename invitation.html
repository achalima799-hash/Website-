<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>دعوة</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Aref+Ruqaa:wght@400;700&family=Amiri:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root{
    --maroon: #2f0811;
    --maroon-deep: #1c0509;
    --bordeaux: #3a0a16;
    --gold: #c9a15c;
    --gold-bright: #e6c98a;
    --gold-dark: #8b6a34;
    --cream: #f3e9dc;
  }

  *{ box-sizing: border-box; }

  html, body{
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: var(--maroon-deep);
    overflow: hidden;
    font-family: 'EB Garamond', serif;
  }

  #stage{
    position: relative;
    width: 100%;
    height: 100vh;
    height: 100dvh;
    perspective: 1600px;
    overflow: hidden;
    background: var(--maroon-deep);
  }

  /* ================= PAGE 1 : ENVELOPE ================= */
  #page1{
    position: absolute;
    inset: 0;
    z-index: 3;
    transform-origin: top center;
    transform-style: preserve-3d;
    transition: transform 1.6s cubic-bezier(.55,0,.1,1), opacity 1.6s ease 0.2s;
  }
  #page1.opening{
    transform: rotateX(-38deg) translateY(-6%) scale(0.94);
    opacity: 0;
    pointer-events: none;
  }
  #envelope-img{
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    user-select: none;
    -webkit-user-drag: none;
  }
  #flash{
    position: absolute;
    left: 60%;
    top: 57%;
    width: 40px;
    height: 40px;
    transform: translate(-50%,-50%) scale(0);
    border-radius: 50%;
    background: radial-gradient(circle, var(--gold-bright) 0%, rgba(230,201,138,0.6) 35%, rgba(230,201,138,0) 70%);
    pointer-events: none;
    opacity: 0;
  }
  #flash.burst{ animation: burst 1s ease-out forwards; }
  @keyframes burst{
    0%   { opacity: 0; transform: translate(-50%,-50%) scale(0); }
    15%  { opacity: 1; }
    100% { opacity: 0; transform: translate(-50%,-50%) scale(22); }
  }
  #seal{
    position: absolute;
    left: 60%;
    top: 57%;
    width: 22%;
    aspect-ratio: 1 / 1;
    transform: translate(-50%,-50%);
    border-radius: 50%;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.9s cubic-bezier(.34,1.56,.64,1), filter 0.9s ease;
    filter: drop-shadow(0 0 0 rgba(230,201,138,0));
  }
  #seal:active{ transform: translate(-50%,-50%) scale(0.96); }
  #seal.pulse{
    transform: translate(-50%,-50%) scale(1.14) rotate(6deg);
    filter: drop-shadow(0 0 22px rgba(230,201,138,0.85));
  }
  #hint1{
    position: absolute;
    left: 50%;
    bottom: 9%;
    transform: translateX(-50%);
    color: var(--cream);
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 15px;
    letter-spacing: 3px;
    text-transform: uppercase;
    opacity: 0.85;
    animation: breathe 2.6s ease-in-out infinite;
    text-align: center;
    white-space: nowrap;
  }
  @keyframes breathe{ 0%,100%{ opacity: 0.5; } 50%{ opacity: 0.95; } }
  #page1.opening #hint1{ opacity: 0; transition: opacity 0.4s ease; }

  /* ================= PAGE 2 : VIDEO ================= */
  #page2{
    position: absolute;
    inset: 0;
    z-index: 2;
    opacity: 0;
    visibility: hidden;
    transform: translateY(24px);
    transition: opacity 1.1s ease, transform 1.1s cubic-bezier(.22,1,.36,1), visibility 0s linear 1.1s;
  }
  #page2.show{
    opacity: 1;
    visibility: visible;
    transform: translateY(0);
    transition: opacity 1.1s ease, transform 1.1s cubic-bezier(.22,1,.36,1), visibility 0s;
    z-index: 4;
  }
  #page2.leaving{
    transform: translateY(-100%);
    transition: transform 0.9s cubic-bezier(.55,0,.1,1);
  }
  #bg-video{
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  #page2-overlay{
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, rgba(0,0,0,0.28) 0%, rgba(0,0,0,0.05) 30%, rgba(0,0,0,0.15) 65%, rgba(0,0,0,0.55) 100%);
  }
  .page2-text{
    position: absolute;
    left: 50%;
    top: 46%;
    transform: translate(-50%,-50%);
    text-align: center;
    width: 90%;
  }
  .p2-title{
    font-family: 'Aref Ruqaa', serif;
    font-weight: 700;
    color: var(--gold-bright);
    font-size: clamp(38px, 11vw, 58px);
    margin: 0 0 14px;
    text-shadow: 0 2px 18px rgba(0,0,0,0.55);
    letter-spacing: 1px;
  }
  .p2-date{
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: var(--cream);
    font-size: clamp(18px, 4.5vw, 24px);
    letter-spacing: 2px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.6);
  }
  #hint2{
    position: absolute;
    left: 50%;
    bottom: 6%;
    transform: translateX(-50%);
    color: var(--cream);
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 15px;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-align: center;
    white-space: nowrap;
    text-shadow: 0 2px 10px rgba(0,0,0,0.6);
  }
  #hint2 .arrow{
    display: block;
    margin: 6px auto 0;
    width: 16px;
    height: 16px;
    border-right: 2px solid var(--cream);
    border-bottom: 2px solid var(--cream);
    transform: rotate(45deg);
    animation: bob 1.6s ease-in-out infinite;
  }
  @keyframes bob{
    0%,100%{ transform: rotate(45deg) translate(0,0); opacity: 0.6; }
    50%{ transform: rotate(45deg) translate(4px,4px); opacity: 1; }
  }

  /* ================= PAGE 3 : CURTAIN REVEAL ================= */
  #page3{
    position: absolute;
    inset: 0;
    z-index: 1;
    background: var(--bordeaux);
    opacity: 0;
    visibility: hidden;
    transform: translateY(40px);
    transition: opacity 1s ease, transform 1s cubic-bezier(.22,1,.36,1), visibility 0s linear 1s;
  }
  #page3.show{
    opacity: 1;
    visibility: visible;
    transform: translateY(0);
    transition: opacity 1s ease, transform 1s cubic-bezier(.22,1,.36,1), visibility 0s;
    z-index: 5;
  }

  #p3-content{
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 30px;
  }
  .p3-card{ max-width: 480px; text-align: center; }
  .bismillah{
    font-family: 'Amiri', serif;
    font-style: italic;
    color: var(--gold-bright);
    font-size: clamp(20px, 5vw, 26px);
    margin: 0 0 30px;
  }
  .p3-poem{
    font-family: 'Cormorant Garamond', serif;
    color: var(--cream);
    font-size: clamp(18px, 4.6vw, 22px);
    line-height: 2.15;
    margin: 0 0 26px;
  }
  .p3-invite{
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: var(--cream);
    font-size: clamp(16px, 4vw, 19px);
    line-height: 2;
    margin: 0 0 22px;
    opacity: 0.95;
  }
  .p3-name{
    font-family: 'Aref Ruqaa', serif;
    font-weight: 700;
    color: var(--gold-bright);
    font-size: clamp(42px, 12vw, 64px);
    margin: 6px 0 0;
    text-shadow: 0 2px 20px rgba(0,0,0,0.4);
  }

  /* curtains */
  .curtain{
    position: absolute;
    top: 0;
    bottom: 0;
    width: 52%;
    z-index: 10;
    background:
      repeating-linear-gradient(90deg,
        #d8b06a 0px, #c9a15c 18px, #a9803f 34px, #c9a15c 50px, #e6c98a 66px);
    box-shadow: inset 0 0 60px rgba(0,0,0,0.35);
    transition: transform 2.2s cubic-bezier(.65,0,.35,1);
  }
  .curtain::after{
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0.25), transparent 12%, transparent 88%, rgba(0,0,0,0.4));
  }
  .curtain-left{ left: 0; transform: translateX(0); box-shadow: 8px 0 30px rgba(0,0,0,0.45); }
  .curtain-right{ right: 0; transform: translateX(0); box-shadow: -8px 0 30px rgba(0,0,0,0.45); }
  #page3.open .curtain-left{ transform: translateX(-102%); }
  #page3.open .curtain-right{ transform: translateX(102%); }

  @media (prefers-reduced-motion: reduce){
    #page1, #page2, #page3, #seal, #flash, #hint1, #hint2 .arrow, .curtain{ transition: none !important; animation: none !important; }
  }
</style>
</head>
<body>

<div id="stage">

  <!-- PAGE 1: closed envelope -->
  <div id="page1">
    <img id="envelope-img" src="envelope.png" alt="مغلف الدعوة">
    <div id="flash"></div>
    <div id="seal" role="button" aria-label="افتح الدعوة" tabindex="0"></div>
    <div id="hint1">اضغط على الختم لفتح الدعوة</div>
  </div>

  <!-- PAGE 2: video -->
  <div id="page2">
    <video id="bg-video" src="bg-video.mp4" autoplay muted loop playsinline></video>
    <div id="page2-overlay"></div>
    <div class="page2-text">
      <h1 class="p2-title">وطية أسماء</h1>
      <p class="p2-date">10 جويلية 2026</p>
    </div>
    <div id="hint2">اسحب للأسفل<span class="arrow"></span></div>
  </div>

  <!-- PAGE 3: bordeaux + gold curtains -->
  <div id="page3">
    <div id="p3-content">
      <div class="p3-card">
        <p class="bismillah">بسم الله الرحمن الرحيم</p>
        <p class="p3-poem">
          يحكيو على بنية سمحة ومقدية، المضحك فضة والخدين نوار،<br>
          عشية كبرت وحلات المزيانة ومدت يديها للحنة،<br>
          ربي يزين عليها ويتمم فرحتها.
        </p>
        <p class="p3-invite">
          واليوم تتشرف ميمتها بجيتكم، وتستدعاكم باش تحضروا وطية بنيتها الغالية
        </p>
        <p class="p3-name">أسماء</p>
      </div>
    </div>
    <div class="curtain curtain-left"></div>
    <div class="curtain curtain-right"></div>
  </div>

</div>

<script>
  const seal = document.getElementById('seal');
  const page1 = document.getElementById('page1');
  const page2 = document.getElementById('page2');
  const page3 = document.getElementById('page3');
  const flash = document.getElementById('flash');
  const video = document.getElementById('bg-video');

  let opened = false;
  let onPage2 = false;
  let onPage3 = false;

  function openEnvelope(){
    if (opened) return;
    opened = true;

    seal.classList.add('pulse');

    setTimeout(() => {
      flash.classList.add('burst');
      page1.classList.add('opening');
    }, 750);

    setTimeout(() => {
      page2.classList.add('show');
      onPage2 = true;
      video.currentTime = 0;
      video.play().catch(()=>{});
    }, 750 + 1500);
  }

  function goToPage3(){
    if (!onPage2 || onPage3) return;
    onPage3 = true;

    page2.classList.add('leaving');
    page3.classList.add('show');

    // let the curtains sit closed for a beat, then open slowly
    setTimeout(() => {
      page3.classList.add('open');
    }, 700);
  }

  seal.addEventListener('click', openEnvelope);
  seal.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') openEnvelope();
  });

  // swipe up (finger moves up) / scroll down -> go to page 3
  let touchStartY = null;
  page2.addEventListener('touchstart', (e) => { touchStartY = e.touches[0].clientY; }, {passive:true});
  page2.addEventListener('touchend', (e) => {
    if (touchStartY === null) return;
    const dy = touchStartY - e.changedTouches[0].clientY;
    if (dy > 40) goToPage3();
    touchStartY = null;
  }, {passive:true});

  page2.addEventListener('wheel', (e) => {
    if (e.deltaY > 15) goToPage3();
  }, {passive:true});

  document.addEventListener('keydown', (e) => {
    if (onPage2 && !onPage3 && (e.key === 'ArrowDown' || e.key === 'PageDown')) goToPage3();
  });
</script>

</body>
</html>
